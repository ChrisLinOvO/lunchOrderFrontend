name: Deploy Build to Backend

on:
  push:
    branches:
      - master

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Create PR to lunchOrderBackend
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ChrisLinOvO/lunchOrderBackend
          branch: ai/update-frontend-build
          title: "chore: update frontend build from lunchOrderFrontend"
          base: master
          delete-branch: true
